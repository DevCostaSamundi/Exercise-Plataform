version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: exercise-postgres
    environment:
      POSTGRES_USER: "exercise_user"
      POSTGRES_PASSWORD: "Adult149databaseMande"
      POSTGRES_DB: "exercise_platform"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: