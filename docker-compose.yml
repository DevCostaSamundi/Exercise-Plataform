version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: exercise-postgres
    environment:
      POSTGRES_USER: exercise_user
      POSTGRES_PASSWORD: YOUR_PASSWORD_HERE
      POSTGRES_DB: exercise_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exercise_user -d exercise_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
